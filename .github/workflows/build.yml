name: Build & Release APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Fix gradlew
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          GRADLE_VERSION=$(grep "distributionUrl" gradle/wrapper/gradle-wrapper.properties \
            | sed 's/.*gradle-\(.*\)-bin\.zip.*/\1/')
          curl -fsSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" \
            -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-install
          /tmp/gradle-install/gradle-${GRADLE_VERSION}/bin/gradle wrapper \
            --gradle-version "$GRADLE_VERSION" --distribution-type bin
          chmod +x gradlew

      - name: Build Debug APK (sem assinatura)
        run: ./gradlew assembleGplayDebug --stacktrace

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30
