name: Build & Release APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Fix gradlew line endings (CRLF → LF)
        run: sed -i 's/\r$//' gradlew && chmod +x gradlew

      - name: Fix gradle-wrapper.jar (download fresh copy)
        run: |
          GRADLE_VERSION=$(grep "distributionUrl" gradle/wrapper/gradle-wrapper.properties \
            | sed 's/.*gradle-\(.*\)-bin.zip/\1/')
          echo "Gradle version: $GRADLE_VERSION"
          curl -fsSL "https://raw.githubusercontent.com/nicoulaj/gradle-wrapper-diff/master/gradle-wrappers/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          curl -fsSL "https://github.com/gradle/gradle/raw/v${GRADLE_VERSION}.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          wget -q "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}.0/gradle/wrapper/gradle-wrapper.jar" \
            -O gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true
          # Fallback: use gradle to regenerate wrapper
          if ! java -jar gradle/wrapper/gradle-wrapper.jar --version &>/dev/null; then
            curl -fsSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" \
              -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
            GRADLE_BIN=$(find /tmp/gradle-dist -name "gradle" -type f | head -1)
            $GRADLE_BIN wrapper --gradle-version "$GRADLE_VERSION"
          fi

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks

      - name: Create local.properties
        run: |
          printf 'sdk.dir=/usr/local/lib/android/sdk\n' > local.properties

      - name: Build Release APK
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_FILE: ${{ github.workspace }}/keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: ./gradlew assembleGplayRelease --stacktrace

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep "^VERSION_NAME" gradle.properties | cut -d'=' -f2)
          VERSION_CODE=$(grep "^VERSION_CODE" gradle.properties | cut -d'=' -f2)
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.version_code }}
          name: "Right Gallery v${{ steps.version.outputs.version_name }}"
          body: |
            ## Right Gallery v${{ steps.version.outputs.version_name }} (build ${{ steps.version.outputs.version_code }})

            ### Mudanças nesta versão
            - Botão stretch no VideoFragment (ic_maximize_vector)
            - Blur background no PhotoFragment via BlurTransformation(60, 3)
            - Fundo transparente no SubsamplingScaleImageView para mostrar o blur
            - Badge de tamanho das pastas nos 3 layouts de diretório
            - Opção "Mostrar tamanho das pastas" nas configurações do app

            Built from commit ${{ github.sha }}
          files: ${{ steps.find_apk.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
